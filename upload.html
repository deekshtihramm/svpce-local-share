<!DOCTYPE html>
<html>
<head>
    <title>Upload File - SVP Share</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <div class="logo">SVP Local Share</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="download.html">Download</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="upload-section">

    <h1>Upload Files</h1>
    <p>Select a file and upload it to your local network</p>

    <div class="upload-card">

        <input type="file" id="fileInput" class="file-input">

        <button class="primary-btn" onclick="uploadFile()">Upload File</button>

        <p id="uploadStatus" class="status-text"></p>

    </div>

</section>

<script>
    function uploadFile() {

        console.log("🚀 XML generation started");

        let fileInput = document.getElementById("fileInput");
        let file = fileInput.files[0];

        if (!file) {
            alert("Select a file");
            return;
        }

        // File details
        let fileName = file.name;
        let fileSize = file.size;
        let fileType = file.type;
        let lastModified = new Date(file.lastModified).toString();

        // Random code
        let code = Math.random().toString(36).substring(2, 8).toUpperCase();

        // XML content
        let xmlContent = `<?xml version="1.0" encoding="UTF-8"?>
    <fileUpload>
        <code>${code}</code>
        <file>
            <name>${fileName}</name>
            <type>${fileType}</type>
            <size>${fileSize} bytes</size>
            <lastModified>${lastModified}</lastModified>
        </file>
    </fileUpload>`;

        // Create XML file and download
        let blob = new Blob([xmlContent], { type: "application/xml" });
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = fileName + "_details.xml";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);

        document.getElementById("uploadStatus").innerText =
            "XML created successfully! Code: " + code;

        alert("XML downloaded successfully!");
    }

</script>
</body>
</html>
